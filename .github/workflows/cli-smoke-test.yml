name: CLI Smoke Test

# Builds, packs and globally installs very-happy-cli, then runs the binary's
# basic subcommands. Cross-platform because the postinstall step
# (scripts/unpack-tools.cjs) unpacks platform-specific binaries — we want to
# catch a broken install on Linux/macOS/Windows before publishing.

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/happy-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/happy-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 24]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build very-happy-cli
        run: pnpm --filter very-happy-cli build

      - name: Verify wire is bundled (no external @slopus/happy-wire import)
        shell: bash
        run: |
          if grep -rnE "(import|require|from)[^\n]*['\"]@slopus/happy-wire['\"]" packages/happy-cli/dist; then
            echo "ERROR: dist still imports @slopus/happy-wire externally; bundle failed." >&2
            exit 1
          fi
          echo "OK: @slopus/happy-wire is inlined into dist."

      - name: Pack + global install (runs postinstall on this platform)
        shell: bash
        run: |
          pnpm --filter very-happy-cli pack --pack-destination packages/happy-cli
          PKG=$(ls packages/happy-cli/*.tgz)
          npm install -g "./$PKG"

      - name: Run very-happy subcommands
        shell: bash
        run: |
          echo "very-happy --version"
          timeout 30 very-happy --version || { echo "FAIL: --version"; exit 1; }
          echo "very-happy --help"
          timeout 30 very-happy --help || { echo "FAIL: --help"; exit 1; }
          echo "very-happy doctor"
          timeout 60 very-happy doctor || { echo "FAIL: doctor"; exit 1; }
          echo "Smoke test passed on ${{ matrix.os }} (node ${{ matrix.node-version }})"
